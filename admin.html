<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Ignite Studio — Content Manager</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preload" href="assets/fonts/bricolage-grotesque-var.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="assets/fonts/hanken-grotesk-var.woff2" as="font" type="font/woff2" crossorigin />
  <style>
    @font-face { font-family:"Bricolage Grotesque"; src:url("assets/fonts/bricolage-grotesque-var.woff2") format("woff2"); font-weight:200 800; font-display:swap; }
    @font-face { font-family:"Hanken Grotesk"; src:url("assets/fonts/hanken-grotesk-var.woff2") format("woff2"); font-weight:100 900; font-display:swap; }
    :root{
      --flame:#FA5903; --flame-bright:#FF6E1F; --ember:#FB3607; --gold:#FD9004;
      --ink:#0B0908; --ink-2:#120D0C; --surface:#1A1311; --surface-2:#221917;
      --line:rgba(255,255,255,.10); --line-2:rgba(255,255,255,.16);
      --text:#F3EBE6; --muted:#B7A9A2; --muted-2:#8E817B;
      --grad-fire:linear-gradient(100deg,var(--gold),var(--flame) 45%,var(--ember));
      --display:"Bricolage Grotesque",sans-serif; --body:"Hanken Grotesk",system-ui,sans-serif;
      --radius:14px; --ok:#3FB950; --err:#F85149;
    }
    *{box-sizing:border-box;margin:0}
    body{font-family:var(--body);background:var(--ink);color:var(--text);line-height:1.55;-webkit-font-smoothing:antialiased}
    h1,h2,h3,h4{font-family:var(--display);font-weight:800;letter-spacing:-.02em;line-height:1.1}
    a{color:var(--flame-bright)}
    button{font-family:var(--body);cursor:pointer}
    .btn{display:inline-flex;align-items:center;gap:8px;border:1px solid transparent;border-radius:999px;padding:11px 20px;font-weight:600;font-size:.95rem;transition:transform .2s,box-shadow .2s,background .2s,border-color .2s}
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{background:var(--grad-fire);color:#1A0E05;box-shadow:0 8px 24px -8px rgba(251,54,7,.55)}
    .btn-ghost{background:transparent;color:var(--muted);border-color:var(--line-2)}
    .btn-ghost:hover{color:var(--text)}
    .btn-danger{background:transparent;color:var(--err);border-color:rgba(248,81,73,.4)}
    .btn-danger:hover{background:rgba(248,81,73,.1)}
    .btn-sm{padding:7px 14px;font-size:.85rem}

    /* login */
    #login{min-height:100vh;display:grid;place-items:center;padding:24px}
    .login-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:36px;box-shadow:0 40px 90px -30px #000}
    .login-card .mark{width:52px;height:52px;border-radius:14px;background:var(--grad-fire);display:grid;place-items:center;font-family:var(--display);font-weight:800;color:#1A0E05;font-size:1.5rem;margin-bottom:20px}
    .login-card h1{font-size:1.5rem;margin-bottom:6px}
    .login-card p{color:var(--muted);font-size:.92rem;margin-bottom:22px}
    label{display:block;font-size:.8rem;font-weight:600;color:var(--muted);margin:0 0 6px}
    input,textarea,select{width:100%;font-family:var(--body);font-size:.95rem;padding:11px 14px;border-radius:10px;border:1.5px solid var(--line-2);background:var(--ink-2);color:var(--text);transition:border-color .2s,box-shadow .2s}
    textarea{resize:vertical;min-height:80px;line-height:1.5}
    input:focus,textarea:focus,select:focus{outline:none;border-color:var(--flame);box-shadow:0 0 0 3px rgba(250,89,3,.18)}
    .field{margin-bottom:16px}
    .field .hint{font-size:.76rem;color:var(--muted-2);margin-top:5px}
    .msg{font-size:.88rem;padding:10px 14px;border-radius:10px;margin-top:14px;display:none}
    .msg.show{display:block}
    .msg.ok{background:rgba(63,185,80,.12);color:var(--ok)}
    .msg.err{background:rgba(248,81,73,.12);color:var(--err)}

    /* app shell */
    #app{display:none;min-height:100vh;grid-template-columns:248px 1fr}
    .sidebar{background:var(--ink-2);border-right:1px solid var(--line);padding:22px 16px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
    .sidebar .brand{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:800;font-size:1.05rem;padding:0 8px 20px;border-bottom:1px solid var(--line);margin-bottom:14px}
    .sidebar .brand .dot{width:30px;height:30px;border-radius:9px;background:var(--grad-fire);display:grid;place-items:center;color:#1A0E05;font-size:1rem}
    .nav-group{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted-2);padding:14px 10px 6px}
    .nav-item{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;text-align:left;background:transparent;border:none;color:var(--muted);padding:9px 12px;border-radius:9px;font-size:.92rem;transition:background .15s,color .15s}
    .nav-item:hover{background:var(--surface);color:var(--text)}
    .nav-item.active{background:var(--surface-2);color:var(--text);font-weight:600}
    .nav-item .count{font-size:.72rem;color:var(--muted-2);background:var(--ink);padding:1px 7px;border-radius:999px}
    .sidebar .foot{margin-top:auto;padding-top:16px;border-top:1px solid var(--line);font-size:.82rem;color:var(--muted-2)}
    .sidebar .foot a{display:block;margin-bottom:8px}

    .main{padding:32px 40px;max-width:920px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:8px;flex-wrap:wrap}
    .topbar h2{font-size:1.6rem}
    .topbar .sub{color:var(--muted);font-size:.92rem;margin-bottom:26px}
    .section-actions{display:flex;gap:10px;flex-wrap:wrap}

    .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin-bottom:16px}
    .card .card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px}
    .card .card-head h3{font-size:1.1rem}
    .card .card-head .tag{font-size:.74rem;color:var(--muted-2)}
    .row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .repeat-item{border:1px dashed var(--line-2);border-radius:12px;padding:16px;margin-bottom:12px;position:relative}
    .repeat-item .rm{position:absolute;top:10px;right:10px}
    .save-bar{position:sticky;bottom:0;background:linear-gradient(180deg,transparent,var(--ink) 40%);padding:18px 0 4px;display:flex;gap:12px;align-items:center}
    .toggle{display:inline-flex;align-items:center;gap:9px;font-size:.9rem;color:var(--muted)}
    .toggle input{width:auto}
    .empty{color:var(--muted-2);padding:40px;text-align:center;border:1px dashed var(--line);border-radius:var(--radius)}
    .lead-row{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}
    .lead-row .pill{font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:999px;background:var(--surface-2);color:var(--flame-bright);text-transform:uppercase;letter-spacing:.04em}
    .lead-row .meta{font-size:.82rem;color:var(--muted-2)}
    .spinner{width:20px;height:20px;border:2px solid var(--line-2);border-top-color:var(--flame);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media (max-width:820px){
      #app{grid-template-columns:1fr}
      .sidebar{position:static;height:auto;flex-direction:column}
      .main{padding:24px 18px}
      .row-2{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <!-- ===== LOGIN ===== -->
  <div id="login">
    <form class="login-card" id="loginForm" autocomplete="on">
      <div class="mark" aria-hidden="true">🔥</div>
      <h1>Content Manager</h1>
      <p>Sign in to edit your Ignite Studio website.</p>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="username" required placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required placeholder="••••••••••••" />
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center" id="loginBtn">Sign in</button>
      <div class="msg" id="loginMsg"></div>
    </form>
  </div>

  <!-- ===== APP ===== -->
  <div id="app">
    <aside class="sidebar">
      <div class="brand"><span class="dot" aria-hidden="true">🔥</span> Ignite CMS</div>
      <nav id="navMenu"></nav>
      <div class="foot">
        <a href="index.html" target="_blank" rel="noopener">View site ↗</a>
        <button class="nav-item" id="logoutBtn" style="padding-left:0;color:var(--muted-2)">Sign out</button>
        <span id="whoami"></span>
      </div>
    </aside>
    <main class="main" id="view"><div class="empty"><span class="spinner"></span></div></main>
  </div>

  <script src="js/cms-config.js?v=23"></script>
  <script src="js/admin.js?v=23"></script>
</body>
</html>

<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Ignite Studio — Content Manager</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preload" href="assets/fonts/bricolage-grotesque-var.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="assets/fonts/hanken-grotesk-var.woff2" as="font" type="font/woff2" crossorigin />
  <style>
    @font-face { font-family:"Bricolage Grotesque"; src:url("assets/fonts/bricolage-grotesque-var.woff2") format("woff2"); font-weight:200 800; font-display:swap; }
    @font-face { font-family:"Hanken Grotesk"; src:url("assets/fonts/hanken-grotesk-var.woff2") format("woff2"); font-weight:100 900; font-display:swap; }
    :root{
      --flame:#FA5903; --flame-bright:#FF6E1F; --ember:#FB3607; --gold:#FD9004;
      --ink:#0B0908; --ink-2:#100B0A; --surface:#181110; --surface-2:#211815; --surface-3:#2A1E1A;
      --line:rgba(255,255,255,.08); --line-2:rgba(255,255,255,.14);
      --text:#F5EEE9; --muted:#B7A9A2; --muted-2:#8A7D77;
      --grad-fire:linear-gradient(100deg,var(--gold),var(--flame) 48%,var(--ember));
      --display:"Bricolage Grotesque",sans-serif; --body:"Hanken Grotesk",system-ui,sans-serif;
      --radius:16px; --radius-sm:10px; --ok:#3FB950; --err:#F85149;
    }
    *{box-sizing:border-box;margin:0}
    html{-webkit-text-size-adjust:100%}
    body{font-family:var(--body);background:var(--ink);color:var(--text);line-height:1.55;-webkit-font-smoothing:antialiased}
    body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(60% 45% at 82% -5%,rgba(250,89,3,.10),transparent 60%),radial-gradient(45% 40% at 0% 100%,rgba(251,54,7,.07),transparent 55%)}
    h1,h2,h3,h4{font-family:var(--display);font-weight:800;letter-spacing:-.02em;line-height:1.12}
    a{color:var(--flame-bright);text-decoration:none}
    button{font-family:var(--body);cursor:pointer}
    svg{display:block}
    .ic{width:18px;height:18px;flex:0 0 18px;stroke:currentColor;stroke-width:1.9;fill:none;stroke-linecap:round;stroke-linejoin:round}

    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid transparent;border-radius:999px;padding:11px 20px;font-weight:600;font-size:.94rem;transition:transform .18s,box-shadow .18s,background .18s,border-color .18s,color .18s;white-space:nowrap}
    .btn:hover{transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}
    .btn-primary{background:var(--grad-fire);color:#1A0E05;box-shadow:0 10px 26px -10px rgba(251,54,7,.6)}
    .btn-primary:hover{box-shadow:0 14px 32px -10px rgba(251,54,7,.75)}
    .btn-ghost{background:transparent;color:var(--muted);border-color:var(--line-2)}
    .btn-ghost:hover{color:var(--text);border-color:var(--muted-2)}
    .btn-danger{background:transparent;color:var(--err);border-color:rgba(248,81,73,.35)}
    .btn-danger:hover{background:rgba(248,81,73,.12)}
    .btn-sm{padding:7px 14px;font-size:.85rem}

    /* ---------- login ---------- */
    #login{position:relative;z-index:1;min-height:100vh;display:grid;place-items:center;padding:24px}
    .login-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--line);border-radius:22px;padding:38px;box-shadow:0 50px 100px -35px #000;position:relative;overflow:hidden}
    .login-card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:var(--grad-fire)}
    .login-card .mark{width:54px;height:54px;border-radius:15px;background:var(--grad-fire);display:grid;place-items:center;font-size:1.6rem;margin-bottom:22px;box-shadow:0 10px 26px -10px rgba(251,54,7,.7)}
    .login-card h1{font-size:1.55rem;margin-bottom:6px}
    .login-card p{color:var(--muted);font-size:.92rem;margin-bottom:24px}
    label{display:block;font-size:.78rem;font-weight:600;color:var(--muted);margin:0 0 6px;letter-spacing:.01em}
    input,textarea,select{width:100%;font-family:var(--body);font-size:.95rem;padding:11px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--line-2);background:var(--ink-2);color:var(--text);transition:border-color .18s,box-shadow .18s}
    textarea{resize:vertical;min-height:82px;line-height:1.55}
    input::placeholder,textarea::placeholder{color:var(--muted-2)}
    input:focus,textarea:focus,select:focus{outline:none;border-color:var(--flame);box-shadow:0 0 0 3px rgba(250,89,3,.18)}
    .field{margin-bottom:18px}
    .field .hint{font-size:.76rem;color:var(--muted-2);margin-top:6px}
    .msg{font-size:.88rem;padding:10px 14px;border-radius:var(--radius-sm);margin-top:14px;display:none}
    .msg.show{display:block}
    .msg.ok{background:rgba(63,185,80,.12);color:var(--ok)}
    .msg.err{background:rgba(248,81,73,.12);color:var(--err)}

    /* ---------- shell ---------- */
    #app{display:none;position:relative;z-index:1;min-height:100vh;grid-template-columns:266px 1fr}
    .sidebar{background:linear-gradient(180deg,var(--ink-2),rgba(16,11,10,.6));border-right:1px solid var(--line);padding:20px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
    .brand{display:flex;align-items:center;gap:11px;padding:4px 8px 18px;margin-bottom:6px;border-bottom:1px solid var(--line)}
    .brand .dot{width:34px;height:34px;border-radius:10px;background:var(--grad-fire);display:grid;place-items:center;font-size:1.15rem;box-shadow:0 8px 20px -8px rgba(251,54,7,.7)}
    .brand b{font-family:var(--display);font-weight:800;font-size:1.05rem}
    .brand small{display:block;color:var(--muted-2);font-size:.72rem;font-weight:500;letter-spacing:.02em}
    .nav-group{font-size:.68rem;text-transform:uppercase;letter-spacing:.14em;color:var(--muted-2);padding:15px 12px 6px;font-weight:700}
    .nav-item{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;border:none;color:var(--muted);padding:9px 12px;border-radius:var(--radius-sm);font-size:.92rem;transition:background .15s,color .15s;position:relative}
    .nav-item .ic{opacity:.8}
    .nav-item .lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .nav-item:hover{background:var(--surface);color:var(--text)}
    .nav-item.active{background:var(--surface-2);color:var(--text);font-weight:600}
    .nav-item.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--grad-fire)}
    .nav-item.active .ic{opacity:1;stroke:var(--flame-bright)}
    .count{font-size:.7rem;font-weight:700;color:var(--muted);background:var(--ink);padding:2px 8px;border-radius:999px;min-width:22px;text-align:center}
    .count.hot{background:var(--grad-fire);color:#1A0E05}
    .foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:2px}
    .foot .who{padding:8px 12px 2px;font-size:.76rem;color:var(--muted-2);overflow:hidden;text-overflow:ellipsis}

    .main{padding:0 0 60px;min-width:0}
    .topbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 40px;background:rgba(11,9,8,.72);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    .topbar .crumb{font-size:.8rem;color:var(--muted-2)}
    .topbar h2{font-size:1.35rem;display:flex;align-items:center;gap:11px}
    .topbar h2 .chip{width:34px;height:34px;border-radius:10px;background:var(--surface-2);border:1px solid var(--line);display:grid;place-items:center;color:var(--flame-bright)}
    .topbar h2 .chip .ic{width:18px;height:18px}
    .wrap{padding:28px 40px;max-width:940px}
    .sub{color:var(--muted);font-size:.94rem;margin:-6px 0 24px;max-width:60ch}
    .bar-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

    .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px;margin-bottom:16px}
    .card>.card-title{font-size:.78rem;text-transform:uppercase;letter-spacing:.12em;color:var(--flame-bright);font-weight:700;margin-bottom:16px}
    .list-row{display:flex;align-items:center;gap:14px;justify-content:space-between;padding:15px 18px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;transition:border-color .18s,transform .18s}
    .list-row:hover{border-color:var(--line-2);transform:translateY(-1px)}
    .list-row .lr-main{min-width:0}
    .list-row .lr-title{font-family:var(--display);font-weight:700;font-size:1.02rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .list-row .lr-meta{font-size:.8rem;color:var(--muted-2);margin-top:2px}
    .badge{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:3px 9px;border-radius:999px}
    .badge.on{background:rgba(63,185,80,.14);color:var(--ok)}
    .badge.off{background:rgba(255,255,255,.06);color:var(--muted-2)}
    .row-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .repeat-item{border:1px solid var(--line-2);border-radius:12px;padding:18px;margin-bottom:12px;position:relative;background:var(--ink-2)}
    .repeat-item .rm{position:absolute;top:12px;right:12px}
    .repeat-item .ri-num{font-size:.72rem;color:var(--muted-2);font-weight:700;margin-bottom:12px;text-transform:uppercase;letter-spacing:.08em}
    .save-bar{position:sticky;bottom:0;margin-top:8px;background:linear-gradient(180deg,transparent,var(--ink) 45%);padding:20px 0 6px;display:flex;gap:12px;align-items:center}
    .save-note{font-size:.82rem;color:var(--muted-2)}
    .toggle{display:inline-flex;align-items:center;gap:10px;font-size:.92rem;color:var(--text);cursor:pointer;padding:6px 0}
    .toggle input{width:44px;height:26px;-webkit-appearance:none;appearance:none;background:var(--surface-3);border-radius:999px;position:relative;transition:background .2s;cursor:pointer;flex:0 0 44px}
    .toggle input::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:var(--muted);transition:transform .2s,background .2s}
    .toggle input:checked{background:var(--flame)}
    .toggle input:checked::after{transform:translateX(18px);background:#fff}
    .empty{color:var(--muted-2);padding:48px;text-align:center;border:1px dashed var(--line-2);border-radius:var(--radius)}

    /* dashboard */
    .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:26px}
    .metric{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;position:relative;overflow:hidden}
    .metric .ic{width:20px;height:20px;color:var(--flame-bright);margin-bottom:14px}
    .metric .big{font-family:var(--display);font-weight:800;font-size:2.3rem;line-height:1}
    .metric .lbl{color:var(--muted-2);font-size:.86rem;margin-top:6px}
    .metric.accent{background:linear-gradient(160deg,rgba(250,89,3,.16),var(--surface) 60%);border-color:rgba(250,89,3,.3)}
    .quick{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px}
    .quick a{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;color:var(--text);font-weight:600;transition:border-color .18s,transform .18s}
    .quick a:hover{border-color:var(--flame);transform:translateY(-2px)}
    .quick a .ic{color:var(--flame-bright)}

    /* leads */
    .lead-row{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;padding:16px 0;border-bottom:1px solid var(--line)}
    .lead-row:last-child{border-bottom:none}
    .lead-row .pill{font-size:.66rem;font-weight:700;padding:4px 11px;border-radius:999px;background:var(--surface-2);color:var(--flame-bright);text-transform:uppercase;letter-spacing:.05em}
    .lead-row .meta{font-size:.8rem;color:var(--muted-2);margin-top:3px}
    .spinner{width:22px;height:22px;border:2px solid var(--line-2);border-top-color:var(--flame);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}
    .center{display:grid;place-items:center;padding:70px}

    @media (max-width:860px){
      #app{grid-template-columns:1fr}
      .sidebar{position:static;height:auto}
      .topbar,.wrap{padding-left:20px;padding-right:20px}
      .row-2{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <!-- ===== LOGIN ===== -->
  <div id="login">
    <form class="login-card" id="loginForm" autocomplete="on">
      <div class="mark" aria-hidden="true">🔥</div>
      <h1>Content Manager</h1>
      <p>Sign in to edit your Ignite Studio website.</p>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="username" required placeholder="you@example.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required placeholder="••••••••••••" />
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%" id="loginBtn">Sign in</button>
      <div class="msg" id="loginMsg"></div>
    </form>
  </div>

  <!-- ===== APP ===== -->
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="dot" aria-hidden="true">🔥</span>
        <span><b>Ignite Studio</b><small>Content Manager</small></span>
      </div>
      <nav id="navMenu"></nav>
      <div class="foot">
        <span class="who" id="whoami"></span>
        <a class="nav-item" href="index.html" target="_blank" rel="noopener"><span class="lbl">View live site ↗</span></a>
        <button class="nav-item" id="logoutBtn"><span class="lbl">Sign out</span></button>
      </div>
    </aside>
    <main class="main">
      <div class="topbar">
        <div>
          <div class="crumb" id="crumb">Content Manager</div>
          <h2 id="viewTitle"><span class="chip" id="viewIcon" aria-hidden="true"></span> <span id="viewTitleText">Dashboard</span></h2>
        </div>
        <div class="bar-actions">
          <a class="btn btn-ghost btn-sm" href="index.html" target="_blank" rel="noopener">Preview site ↗</a>
        </div>
      </div>
      <div class="wrap" id="view"><div class="center"><span class="spinner"></span></div></div>
    </main>
  </div>

  <script src="js/cms-config.js?v=24"></script>
  <script src="js/admin.js?v=24"></script>
</body>
</html>
